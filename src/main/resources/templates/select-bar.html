<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select Your Bar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem 1rem;
        }

        .wrapper { width: 100%; max-width: 760px; }
        .card-wrapper {
            background: white;
            border-radius: 20px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }

        .top-logo { text-align: center; margin-bottom: 2rem; color: white; }
        .top-logo i { font-size: 2.4rem; }
        .top-logo h2 { font-weight: 700; font-size: 1.5rem; margin-top: 0.5rem; }
        .top-logo p { font-size: 0.92rem; }

        .user-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a18cd1, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700;
        }
        .user-name { font-weight: 600; font-size: 0.95rem; }
        .user-role { font-size: 0.78rem; color: #9c8ec1; }
        .logout-link { margin-left: auto; font-size: 0.8rem; text-decoration: none; }

        .section-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.1rem; }
        .bar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }

        .bar-card {
            border: 1.5px solid #e8e0f5;
            border-radius: 14px;
            padding: 1.25rem;
            cursor: pointer;
            transition: 0.2s;
            background: #fdfbff;
            text-align: left;
        }
        .bar-card:hover { border-color: #764ba2; background: #f5eeff; }

        .bar-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, #a18cd1, #764ba2);
            display: flex; align-items: center; justify-content: center; color: white;
        }

        .no-bars { text-align: center; padding: 2rem; color: #b0a0c8; }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Logo -->
    <div class="top-logo">
        <i class="bi bi-shop-window"></i>
        <h2>Liquor Inventory</h2>
        <p>Select a bar location to continue</p>
    </div>

    <div class="card-wrapper">

        <!-- USER INFO -->
        <div class="user-row">

            <!-- SAFE AVATAR -->
            <div class="user-avatar"
                 th:text="${currentUser != null and currentUser.name != null and !currentUser.name.isEmpty() 
                 ? #strings.toUpperCase(#strings.substring(currentUser.name, 0, 1)) 
                 : 'U'}">
            </div>

            <div>
                <!-- SAFE NAME -->
                <div class="user-name"
                     th:text="${currentUser != null and currentUser.name != null ? currentUser.name : 'User'}">
                </div>

                <!-- SAFE ROLE -->
                <div class="user-role"
                     th:text="${currentUser != null and currentUser.role != null ? currentUser.role : ''}">
                </div>
            </div>

            <a href="/logout" class="logout-link">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>

        <hr>

        <!-- ALERTS -->
        <div class="alert alert-danger" th:if="${barError != null}" th:text="${barError}"></div>
        <div class="alert alert-success" th:if="${barSuccess != null}" th:text="${barSuccess}"></div>

        <!-- LABEL -->
        <div class="section-label">Your bar locations</div>

        <!-- NO BARS -->
        <div class="no-bars" th:if="${#lists.isEmpty(bars)}">
            No bars assigned. Contact admin.
        </div>

        <!-- BAR LIST -->
        <div class="bar-grid" th:if="${not #lists.isEmpty(bars)}">

            <!-- ✅ POST FORM PER BAR -->
            <form th:each="bar : ${bars}" th:action="@{/select-bar}" method="post">

                <input type="hidden" name="barId" th:value="${bar.barId}" />

                <button type="submit" class="bar-card">

                    <div class="bar-icon">
                        <i class="bi bi-shop"></i>
                    </div>

                    <div>
                        <strong th:text="${bar.barName}">Bar Name</strong>
                    </div>

                    <div th:if="${bar.city != null}">
                        <small th:text="${bar.city}"></small>
                    </div>

                </button>

            </form>

        </div>

    </div>
</div>

</body>
</html>
