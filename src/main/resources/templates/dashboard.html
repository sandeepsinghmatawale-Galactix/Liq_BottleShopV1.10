<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SAME CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- SAME STYLE -->
    <style>
        body { background-color: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .nav-link.active { background: rgba(255,255,255,0.2); border-radius: 8px; font-weight: 600; }
        .bar-card { transition: 0.3s; border-radius: 12px; }
        .bar-card:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
        .admin-panel { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); border-radius: 15px; }
        .sub-card { background: #fafbff; border: 1px solid #e8ecf8; border-radius: 10px; padding: 0.85rem; }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-dark navbar-expand-lg shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
            <i class="bi bi-shield-lock"></i> Admin Panel
        </a>

        <div class="d-flex text-white gap-3">
            <span th:text="${username}"></span>
            <span class="badge bg-light text-dark">ADMIN</span>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- ✅ ADMIN PANEL -->
    <div class="card admin-panel mb-4 shadow-sm">
        <div class="card-body">
            <h5>Admin Controls</h5>
            <a th:href="@{/admin/brands}" class="btn btn-dark btn-sm">Brands</a>
        </div>
    </div>

    <!-- ✅ ALL BARS -->
    <div class="row g-3">

        <div class="col-md-4" th:each="bar : ${bars}">
            <div class="card bar-card shadow-sm h-100">

                <div class="card-body d-flex flex-column">

                    <h6 th:text="${bar.barName}"></h6>
                    <p class="text-muted small" th:text="${bar.location}"></p>

                    <span class="badge bg-success" th:if="${bar.active}">Active</span>
                    <span class="badge bg-warning text-dark" th:if="${!bar.active}">Pending</span>

                    <div class="mt-3 sub-card">
                        <div>Subscription: <b th:text="${bar.subscriptionStatus}"></b></div>
                        <div>Expiry: <span th:text="${bar.subscriptionEndDate}"></span></div>
                    </div>

                    <div class="mt-auto mt-3">
                        <a th:href="@{/admin/bars/{id}/setup(id=${bar.barId})}"
                           class="btn btn-warning btn-sm w-100 mb-2">Setup</a>

                        <a th:href="@{/reports/{id}(id=${bar.barId})}"
                           class="btn btn-primary btn-sm w-100">Reports</a>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
