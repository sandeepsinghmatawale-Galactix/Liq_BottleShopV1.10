<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard</title>

    <!-- SAME CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .billing-hero { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); border-radius: 15px; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold">
            <i class="bi bi-person-badge"></i> Staff Dashboard
        </a>

        <div class="text-white">
            <span th:text="${username}"></span>
            <span class="badge bg-light text-dark">STAFF</span>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- ✅ WELCOME -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4>Welcome, <span th:text="${username}"></span></h4>
            <p>Bar: <b th:text="${bar.barName}"></b></p>
        </div>
    </div>

    <!-- ✅ DAILY WORK -->
    <div class="card billing-hero shadow-sm">
        <div class="card-body d-flex justify-content-between">
            <div>
                <h5>Today's Operations</h5>
                <p>Handle billing & sessions</p>
            </div>
            <a th:href="@{/billing/bills}" class="btn btn-dark btn-sm">
                Open Billing
            </a>
        </div>
    </div>

</div>
</body>
</html>
