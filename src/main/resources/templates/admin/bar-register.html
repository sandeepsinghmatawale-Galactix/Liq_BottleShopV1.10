<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register New Bar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .section-header {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 8px 14px;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .step-indicator .step {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }
        .step.active  { background: #667eea; color: white; }
        .step.pending { background: #dee2e6; color: #6c757d; }
        .step-line { flex: 1; height: 2px; background: #dee2e6; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-shop"></i> Liquor Inventory
        </a>

        <!-- Current User -->
        <div class="text-white small">
            Logged in as: <strong th:text="${currentUser.name}"></strong>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 900px;">

    <!-- Breadcrumb -->
    <nav class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item active">Register Bar</li>
        </ol>
    </nav>

    <!-- Step Indicator -->
    <div class="d-flex align-items-center mb-4 step-indicator gap-2">
        <div class="step active">1</div>
        <div class="step-line"></div>
        <div class="step pending">2</div>
        <div class="step-line"></div>
        <div class="step pending">3</div>
        <div class="step-line"></div>
        <div class="step pending">4</div>
        <span class="ms-3 text-muted small">
            Step 1 of 4 — Bar Registration
        </span>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0">
                <i class="bi bi-building-add"></i> Register New Bar / Outlet
            </h5>
        </div>

        <div class="card-body">

            <!-- 🔥 IMPORTANT CHANGE -->
            <form th:action="@{/admin/bars/register}"
                  th:object="${bar}"
                  method="post">

                <!-- CSRF -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- BASIC INFO -->
                <div class="section-header">
                    <i class="bi bi-info-circle"></i> Basic Information
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Bar Name *</label>
                        <input type="text" th:field="*{barName}" class="form-control" required/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Bar Type</label>
                        <select th:field="*{barType}" class="form-select">
                            <option value="">-- Select Type --</option>
                            <option th:each="t : ${barTypes}"
                                    th:value="${t}"
                                    th:text="${t}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Owner Name</label>
                        <input type="text" th:field="*{ownerName}" class="form-control"/>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Contact</label>
                        <input type="text" th:field="*{contactNumber}" class="form-control"/>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control"/>
                    </div>
                </div>

                <!-- ADDRESS -->
                <div class="section-header">
                    <i class="bi bi-geo-alt"></i> Address
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <input type="text" th:field="*{addressLine}" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <input type="text" th:field="*{city}" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <input type="text" th:field="*{state}" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <input type="text" th:field="*{pinCode}" class="form-control"/>
                    </div>
                </div>

                <!-- LICENSE -->
                <div class="section-header">
                    <i class="bi bi-shield-check"></i> License
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <input type="text" th:field="*{licenseNumber}" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <input type="text" th:field="*{licenseType}" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <input type="date" th:field="*{licenseExpiryDate}" class="form-control"/>
                    </div>

                    <div class="col-md-4">
                        <input type="text" th:field="*{gstin}" class="form-control"/>
                    </div>
                </div>

                <!-- 🔥 MULTI-USER SUPPORT -->
                <div class="section-header" th:if="${users != null}">
                    <i class="bi bi-people"></i> Assign Ownership
                </div>

                <div class="mb-4" th:if="${users != null}">
                    <select name="assignedUserId" class="form-select">
                        <option value="">Assign to Me</option>
                        <option th:each="u : ${users}"
                                th:value="${u.id}"
                                th:text="${u.name}">
                        </option>
                    </select>
                </div>

                <!-- ACTION -->
                <div class="d-flex justify-content-between">
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                        Cancel
                    </a>

                    <button class="btn btn-primary px-4">
                        Create Bar
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
