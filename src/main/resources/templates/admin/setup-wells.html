<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Setup - Well Opening Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .well-input { width: 90px; text-align: right; }
        #searchWrapper { position: relative; }
        #searchResults {
            display: none; position: absolute; top: calc(100% + 2px);
            left: 0; right: 0; z-index: 1055; max-height: 300px; overflow-y: auto;
            background: #fff; border: 1px solid #c8d0da;
            border-radius: 0 0 6px 6px; box-shadow: 0 6px 18px rgba(0,0,0,.13);
        }
        .brand-header {
            padding: 5px 14px 3px; font-size: .75rem; font-weight: 700;
            letter-spacing: .05em; text-transform: uppercase;
            color: #198754; background: #f0faf4; border-bottom: 1px solid #ddf0e4;
        }
        .size-option {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 14px 6px 22px; font-size: .87rem;
            cursor: pointer; border-bottom: 1px solid #f5f5f5;
        }
        .size-option:hover { background: #e9f5ee; }
        .size-option.is-added { background: #f0faf0; color: #aaa; cursor: default; }
        .size-mrp { margin-left: auto; color: #198754; font-weight: 600; font-size: .82rem; }
        th.well-col { background: #0f6e56; text-align: center; min-width: 110px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-bar-chart-fill"></i> Admin Setup — Well Opening Stock</span>
        <span class="text-white small">
            Bar: <strong th:text="${session.bar != null ? session.bar.barName : 'N/A'}"></strong>
            &nbsp;|&nbsp; Session #<span th:text="${sessionId}"></span>
        </span>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="alert alert-info">
        <i class="bi bi-info-circle"></i>
        Search a brand → click a size → <strong>enter the bottle count at each well</strong>.
        Leave 0 if a well has none of that brand.
    </div>

    <div class="card shadow">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-2-circle"></i> Step 4b: Well Opening Stock</h5>
            <span class="badge bg-white text-success" id="itemBadge">0 items</span>
        </div>
        <div class="card-body">

            <!-- Search -->
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Search Brand</label>
                    <div id="searchWrapper">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="brandSearch" class="form-control"
                                   placeholder="e.g. Old Monk, Royal Stag…" autocomplete="off"/>
                        </div>
                        <div id="searchResults"></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Category</label>
                    <select id="catFilter" class="form-select">
                        <option value="">All Categories</option>
                        <option>WHISKY</option><option>RUM</option><option>VODKA</option>
                        <option>GIN</option><option>BRANDY</option><option>BEER</option>
                        <option>WINE</option><option>TEQUILA</option><option>OTHER</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="button" class="btn btn-outline-secondary w-100" onclick="clearSearch()">
                        <i class="bi bi-x-lg"></i> Clear
                    </button>
                </div>
            </div>

            <!--
                Form POSTs:
                  brandSizeId[]         — multi-value, one per row
                  qty_{brandSizeId}_{wellName}  e.g. qty_101_Well-1
            -->
            <form th:action="@{/admin/setup/{id}/wells(id=${sessionId})}" method="post" id="wellForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div id="hiddenInputs"></div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle" id="wellTable">
                        <thead class="table-dark" id="tableHead">
                            <tr id="headerRow">
                                <th>Brand</th>
                                <th>Category</th>
                                <th>Size</th>
                                <!-- Well columns injected by JS from wellNames list -->
                                <th class="text-center">Remove</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr id="emptyRow">
                                <td colspan="10" class="text-center text-muted py-4">
                                    <i class="bi bi-search me-1"></i>
                                    Search and add brands above to set well opening stock.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a th:href="@{/admin/setup/{id}/stockroom(id=${sessionId})}"
                       class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Stockroom
                    </a>
                    <button type="submit" class="btn btn-success btn-lg">
                        Save &amp; Review →
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
// wellNames is List<String> from WebController — the bar's configured well names
const wellNames = /*[[${wellNames}]]*/ ['Well-1', 'Well-2'];

// existingStockJson is Map<"brandSizeId_WellName", qty>
// e.g. { "101_Well-1": 3, "101_Well-2": 0 }
const existingStock = /*[[${existingStockJson}]]*/ {};

const addedMap  = new Map();
const searchEl  = document.getElementById('brandSearch');
const resultsEl = document.getElementById('searchResults');
const catEl     = document.getElementById('catFilter');
const tbody     = document.getElementById('tableBody');
const hiddenDiv = document.getElementById('hiddenInputs');
const badgeEl   = document.getElementById('itemBadge');
const emptyRow  = document.getElementById('emptyRow');
let timer = null;

// Inject well column headers
(function buildHeaders() {
    const headerRow = document.getElementById('headerRow');
    const removeCell = headerRow.querySelector('th:last-child');
    wellNames.forEach(w => {
        const th = document.createElement('th');
        th.className = 'well-col text-white';
        th.innerHTML = `${w}<br><small class="fw-normal">(Bottles)</small>`;
        headerRow.insertBefore(th, removeCell);
    });
})();

searchEl.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(doSearch, 250); });
catEl.addEventListener('change', doSearch);
searchEl.addEventListener('focus', () => { if (resultsEl.innerHTML.trim()) resultsEl.style.display = 'block'; });
document.addEventListener('click', e => {
    if (!e.target.closest('#searchWrapper') && !e.target.closest('#catFilter'))
        resultsEl.style.display = 'none';
});

async function doSearch() {
    const q = searchEl.value.trim(), cat = catEl.value;
    if (!q && !cat) { resultsEl.style.display = 'none'; return; }
    try {
        const res = await fetch(
            `/admin/brands/search?q=${encodeURIComponent(q)}&category=${encodeURIComponent(cat)}`,
            { credentials: 'same-origin' }
        );
        renderDropdown(await res.json());
    } catch {
        resultsEl.innerHTML = '<div class="p-3 text-danger small"><i class="bi bi-exclamation-circle"></i> Search failed. Try again.</div>';
        resultsEl.style.display = 'block';
    }
}

function clearSearch() {
    searchEl.value = ''; catEl.value = ''; resultsEl.style.display = 'none'; searchEl.focus();
}

function renderDropdown(brands) {
    if (!brands.length) {
        resultsEl.innerHTML = '<div class="p-3 text-muted small">No brands found.</div>';
        resultsEl.style.display = 'block'; return;
    }
    let html = '';
    brands.forEach(b => {
        html += `<div><div class="brand-header">${esc(b.brandName)}
            ${b.parentCompany ? `<span class="fw-normal text-muted ms-1">(${esc(b.parentCompany)})</span>` : ''}
            <span class="badge bg-success ms-2" style="font-size:.65rem">${esc(b.category)}</span>
            </div>`;
        (b.sizes || []).forEach(s => {
            const k = String(s.brandSizeId), isAdded = addedMap.has(k);
            html += `<div class="size-option ${isAdded ? 'is-added' : ''}"
                onclick="${isAdded ? '' : `addRow(${s.brandSizeId},'${ea(b.brandName)}','${ea(b.category)}','${ea(s.sizeLabel)}',${s.volumeMl||0},${s.mrp||0})`}">
                ${isAdded
                    ? `<i class="bi bi-check-circle-fill text-success"></i><span class="small">Added</span>`
                    : `<i class="bi bi-plus-circle text-success"></i>`}
                <strong>${esc(s.sizeLabel)}</strong>
                ${s.volumeMl ? `<span class="text-muted small">${s.volumeMl} ml</span>` : ''}
                ${s.packaging ? `<span class="badge bg-light text-dark border">${esc(s.packaging)}</span>` : ''}
                <span class="size-mrp">₹${s.mrp ? Number(s.mrp).toFixed(2) : '—'}</span>
            </div>`;
        });
        html += '</div>';
    });
    resultsEl.innerHTML = html; resultsEl.style.display = 'block';
}

function addRow(brandSizeId, brandName, category, sizeLabel, volumeMl, mrp) {
    const k = String(brandSizeId);
    if (addedMap.has(k)) return;
    addedMap.set(k, {});
    emptyRow.style.display = 'none';

    // One hidden brandSizeId
    hiddenDiv.insertAdjacentHTML('beforeend',
        `<input type="hidden" name="brandSizeId" value="${k}" id="hid_id_${k}"/>`);

    // Well qty inputs
    let wellCells = '';
    wellNames.forEach(w => {
        const fieldName = `qty_${k}_${w.replace(/\s+/g, '-')}`;
        const savedKey  = `${k}_${w}`;
        const savedQty  = existingStock[savedKey] !== undefined ? existingStock[savedKey] : 0;
        addedMap.get(k)[w] = savedQty;

        wellCells += `
            <td class="text-center">
                <input type="number"
                       id="vis_${k}_${esc(w)}"
                       name="${fieldName}"
                       class="form-control well-input mx-auto"
                       step="1" min="0" value="${savedQty}" placeholder="0"
                       oninput="onQty('${k}','${ea(w)}',this.value)"/>
            </td>`;

        hiddenDiv.insertAdjacentHTML('beforeend',
            `<input type="hidden" name="${fieldName}" value="${savedQty}" id="hid_${k}_${esc(w)}"/>`);
    });

    const tr = document.createElement('tr');
    tr.id = 'tr_' + k;
    tr.innerHTML = `
        <td><strong>${esc(brandName)}</strong></td>
        <td>${esc(category)}</td>
        <td class="fw-semibold">${esc(sizeLabel)}</td>
        ${wellCells}
        <td class="text-center">
            <button type="button" class="btn btn-sm btn-outline-danger"
                    onclick="removeRow('${k}')">
                <i class="bi bi-trash"></i>
            </button>
        </td>`;
    tbody.appendChild(tr);

    if (savedQty === 0 && existingStock[`${k}_${wellNames[0]}`] === undefined) {
        setTimeout(() => {
            const first = document.getElementById(`vis_${k}_${wellNames[0]}`);
            if (first) first.focus();
        }, 50);
    }

    updateBadge(); doSearch();
}

function onQty(k, wellName, v) {
    const item = addedMap.get(k); if (item) item[wellName] = parseFloat(v) || 0;
    // Also update hidden field (name attr already carries the value but keep in sync)
    const hid = document.getElementById(`hid_${k}_${wellName}`);
    if (hid) hid.value = v;
}

function removeRow(k) {
    addedMap.delete(k);
    // Remove all related hidden inputs and the row
    document.querySelectorAll(`[id^="hid_id_${k}"], [id^="hid_${k}_"], [id^="hid_id_${k}"]`).forEach(el => el.remove());
    const idHid = document.getElementById('hid_id_' + k); if (idHid) idHid.remove();
    const tr = document.getElementById('tr_' + k); if (tr) tr.remove();
    if (!addedMap.size) emptyRow.style.display = '';
    updateBadge(); doSearch();
}

function updateBadge() {
    const n = addedMap.size;
    badgeEl.textContent = n + (n === 1 ? ' item' : ' items');
}

// Sync visible inputs → hidden fields before POST
document.getElementById('wellForm').addEventListener('submit', () => {
    addedMap.forEach((wells, k) => {
        wellNames.forEach(w => {
            const vis = document.getElementById(`vis_${k}_${w}`);
            const hid = document.getElementById(`hid_${k}_${w}`);
            if (vis && hid) hid.value = vis.value;
        });
    });
});

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ea(s) { return s ? String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'") : ''; }
/*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
