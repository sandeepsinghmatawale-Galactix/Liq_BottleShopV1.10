<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wells Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6fb; }
    .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .page-header { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
    .table-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .well-meta { font-size: 12px; color: #6c757d; }
    input[type="number"] { min-width: 90px; }
    .section-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #6c757d; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-grid-3x3-gap"></i> Wells Inventory
    </span>
    <span class="text-white small">
      Session <span class="badge bg-light text-dark" th:text="${invSession.sessionId}"></span>
      | <span th:text="${invSession.bar.barName}"></span>
    </span>
  </div>
</nav>

<div class="container mt-4 mb-5">

  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle"></i>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="page-header">
    <h4 class="mb-1"><i class="bi bi-3-circle"></i> Stage 3: Enter Well Inventory</h4>
    <p class="text-muted mb-0">Record opening, received, and closing stock for each brand in each well.</p>
  </div>

  <form th:action="@{/owner/sessions/{id}/wells(id=${invSession.sessionId})}" method="post">

    <input type="hidden" th:if="${_csrf != null}"
           th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="table-card">
      <div class="table-responsive">
        <table class="table table-bordered align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th style="min-width: 220px;">Brand / Size</th>
              <th th:each="well : ${wells}" class="text-center" style="min-width: 240px;">
                <div th:text="${well.wellName}"></div>
                <div class="well-meta" th:text="${'Well ID: ' + well.barWellId}"></div>
              </th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="brandSize : ${brandSizes}">
              <td>
                <div class="fw-semibold" th:text="${brandSize.brand.brandName}"></div>
                <small class="text-muted" th:text="${brandSize.sizeLabel}"></small>
              </td>

              <td th:each="well : ${wells}">
                <div class="mb-2">
                  <label class="form-label section-label mb-1">Opening</label>
                  <input type="number" step="0.01" min="0"
                         class="form-control form-control-sm"
                         th:name="${'opening_' + brandSize.id + '_' + well.barWellId}"
                         value="0">
                </div>

                <div class="mb-2">
                  <label class="form-label section-label mb-1">Received</label>
                  <input type="number" step="0.01" min="0"
                         class="form-control form-control-sm"
                         th:name="${'received_' + brandSize.id + '_' + well.barWellId}"
                         value="0">
                </div>

                <div>
                  <label class="form-label section-label mb-1">Closing</label>
                  <input type="number" step="0.01" min="0"
                         class="form-control form-control-sm"
                         th:name="${'closing_' + brandSize.id + '_' + well.barWellId}"
                         value="0">
                </div>
              </td>
            </tr>

            <tr th:if="${#lists.isEmpty(brandSizes)}">
              <td th:colspan="${1 + wells.size()}" class="text-center text-muted py-4">
                <i class="bi bi-inbox"></i> No brand sizes available
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between p-4 border-top">
        <a th:href="@{/owner/sessions/{id}/distribution(id=${invSession.sessionId})}" class="btn btn-secondary">
          <i class="bi bi-arrow-left"></i> Back to Distribution
        </a>
        <button type="submit" class="btn btn-success">
          <i class="bi bi-check-circle"></i> Save & Complete Session
        </button>
      </div>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
