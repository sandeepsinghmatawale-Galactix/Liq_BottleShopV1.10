<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Login - BarInventory</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body.customer-theme {
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: #fff;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 25px;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .alert-danger {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(0, 255, 100, 0.2);
            color: #7dffb2;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 5px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 2px #00c6ff;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.5);
        }

        .register-link, .admin-link {
            margin-top: 18px;
            font-size: 13px;
        }

        .register-link a,
        .admin-link a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover,
        .admin-link a:hover {
            text-decoration: underline;
        }

        /* Optional Logo */
        .logo {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="customer-theme">
    <div class="login-container">
        <div class="login-card">

            <div class="logo">🍷 BarInventory</div>

            <h1>Welcome Back</h1>
            <p class="subtitle">Track your drinks. Stay in control.</p>

            <div th:if="${param.error}" class="alert alert-danger">
                Invalid email or password
            </div>

            <div th:if="${param.registered}" class="alert alert-success">
                Registration successful! Please login.
            </div>

            <form th:action="@{/customer/login}" method="post">

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" required autofocus>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="register-link">
                Don’t have an account? 
                <a th:href="@{/customer/register}">Sign Up</a>
            </div>

            <div class="admin-link">
                <a th:href="@{/login}">Staff/Admin Login →</a>
            </div>

        </div>
    </div>
</body>
</html>
