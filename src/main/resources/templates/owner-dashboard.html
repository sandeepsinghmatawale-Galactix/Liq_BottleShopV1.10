<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard</title>

    <!-- SAME CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bar-owner-panel { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); border-radius: 15px; }
        .billing-hero { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border-radius: 15px; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold">
            <i class="bi bi-shop"></i> Owner Dashboard
        </a>

        <div class="text-white">
            <span th:text="${username}"></span>
            <span class="badge bg-light text-dark">OWNER</span>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- ✅ WELCOME -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4>Welcome, <span th:text="${username}"></span></h4>
            <p>Bar: <b th:text="${bar.barName}"></b></p>
        </div>
    </div>

    <!-- ✅ BILLING -->
    <div class="card billing-hero mb-4 shadow-sm">
        <div class="card-body d-flex justify-content-between">
            <div>
                <h5>Billing</h5>
                <p>Create & manage bills</p>
            </div>
            <a th:href="@{/billing/bills}" class="btn btn-dark btn-sm">Open</a>
        </div>
    </div>

    <!-- ✅ REPORTS -->
    <div class="card bar-owner-panel shadow-sm">
        <div class="card-body d-flex justify-content-between">
            <div>
                <h5>Reports & Analytics</h5>
                <p>Track sales & inventory</p>
            </div>
            <a th:href="@{/reports/{id}(id=${bar.barId})}" class="btn btn-dark btn-sm">
                View Reports
            </a>
        </div>
    </div>

</div>
</body>
</html>
